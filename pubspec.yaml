name: upi_pro_sdk
description: >-
  A production-grade Flutter SDK for UPI (Unified Payments Interface) integration.
  Supports UPI intent, deep linking, payment status polling, VPA validation,
  and multi-app UPI launchers - all in one package.
version: 0.1.0
homepage: https://github.com/satyam184/upi_pro_sdk
repository: https://github.com/satyam184/upi_pro_sdk
issue_tracker: https://github.com/satyam184/upi_pro_sdk/issues
documentation: https://pub.dev/documentation/upi_pro_sdk/latest/

environment:
  sdk: ^3.10.3
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.upipro.upi_pro_sdk
        pluginClass: UpiProSdkPlugin
      ios:
        pluginClass: UpiProSdkPlugin

topics:
  - upi
  - payments
  - fintech
  - india
  - flutter
